services:
  # ------------------------------------------------------------------
  # PHP-FPM : exécute le code Symfony
  # ------------------------------------------------------------------
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: api_php
    volumes:
      - ./app:/var/www/html:cached
    depends_on:
      database:
        condition: service_healthy
    environment:
      # surcharge le .env de Symfony depuis Docker
      DATABASE_URL: "mysql://app:app@database:3306/app?serverVersion=11.4.2-MariaDB&charset=utf8mb4"
    networks:
      - api_net

  # ------------------------------------------------------------------
  # Nginx : serveur web, route les requêtes vers PHP-FPM
  # ------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: api_nginx
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - api_net

  # ------------------------------------------------------------------
  # MariaDB : base de données (compatible MySQL)
  # ------------------------------------------------------------------
  database:
    image: mariadb:11.4
    container_name: api_db
    environment:
      MARIADB_DATABASE: app
      MARIADB_USER: app
      MARIADB_PASSWORD: app
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Script d'init : crée la base de test et donne les droits à l'user app
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - api_net

  # ------------------------------------------------------------------
  # Adminer : interface web pour explorer la base (http://localhost:8081)
  # ------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: api_adminer
    ports:
      - "8081:8080"
    depends_on:
      - database
    networks:
      - api_net

volumes:
  db_data:

networks:
  api_net:
